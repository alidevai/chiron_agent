name: 🐛 Bug report
description: Something is broken in the platform core, hooks or pipeline
title: "[bug] "
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: Clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      placeholder: |
        1. python -m core init
        2. python -m core stage ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Relevant output / logs
      description: Command output, audit entries, tracebacks.
      render: text
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: "OS, Python version, Claude Code version"
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight
      options:
        - label: I ran `pytest -q` and `python -m core verify` and included any failures above
        - label: This is not a security vulnerability (those go to SECURITY.md, not a public issue)
          required: true
