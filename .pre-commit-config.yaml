# Yerel commit-oncesi kapi. Kurulum: pip install pre-commit && pre-commit install
# CI ayni kontrolleri tekrar kosar (--no-verify ile atlama yakalanir).
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.2
    hooks:
      - id: ruff            # lint
        args: [--fix]
      - id: ruff-format     # bicimlendir

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml", "-q"]
        additional_dependencies: ["bandit[toml]"]
        files: ^core/

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.0
    hooks:
      - id: gitleaks       # sizmis kimlik bilgisi/token taramasi (offline)
